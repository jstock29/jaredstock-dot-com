name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Required for Workload Identity Federation

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install and Build
        run: |
          npm ci --legacy-peer-deps
          npm run build

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/82365835272/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "github-deployer@driven-binder-500400-c2.iam.gserviceaccount.com"

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Firebase
        run: |
          npm install -g firebase-tools
          echo "DEBUG: GCLOUD_PROJECT_ID is: ${{ secrets.GCLOUD_PROJECT_ID }}"
          echo "DEBUG: GOOGLE_APPLICATION_CREDENTIALS path is: ${{ steps.auth.outputs.credentials_file_path }}"
          # Check if the credentials file exists
          ls -l ${{ steps.auth.outputs.credentials_file_path }}

          # We use the Service Account credentials directly
          export GOOGLE_APPLICATION_CREDENTIALS=${{ steps.auth.outputs.credentials_file_path }}

          # Attempt deploy with debug output
          firebase deploy --only hosting --project=${{ secrets.GCLOUD_PROJECT_ID }} --debug
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth.outputs.credentials_file_path }}
